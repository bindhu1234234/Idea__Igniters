<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.5.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@3.1.0/dist/mobilenet.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #e8f5e9; }
        .container { margin-top: 50px; padding: 20px; background: white; width: 450px; margin: auto; border-radius: 10px; box-shadow: 0 0 10px gray; }
        img { margin-top: 15px; width: 300px; height: auto; }
        button { padding: 10px 20px; background: green; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Plant Disease Detection</h2>
    <input type="file" id="imageUpload" accept="image/*"><br><br>
    <button onclick="detectPlant()">Detect Disease</button>
    <p id="result"></p>
    <img id="preview" />
</div>

<script>
let model;

// Load MobileNet model
async function loadModel() {
    model = await mobilenet.load();
}
loadModel();

async function detectPlant() {
    const fileInput = document.getElementById('imageUpload');
    const result = document.getElementById('result');
    const preview = document.getElementById('preview');

    if (fileInput.files.length === 0) {
        result.innerText = "Please upload an image.";
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        preview.src = e.target.result;

        // Wait for the image to load
        preview.onload = async function() {
            const predictions = await model.classify(preview);
            console.log(predictions);

            // Check if top prediction contains 'plant' or 'leaf'
            const isPlant = predictions.some(pred => 
                pred.className.toLowerCase().includes("plant") || 
                pred.className.toLowerCase().includes("leaf")
            );

            if (isPlant) {
                // Mock disease detection (replace with your model)
                result.innerText = "Plant detected! Disease: Leaf Spot (example)";
            } else {
                result.innerText = "Error: Please upload only plant or leaf images.";
            }
        };
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
