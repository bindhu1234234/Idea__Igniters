<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>

<body>

<h2> Plant Disease Detection</h2>

<input type="file" id="imageUpload" accept="image/*">
<br><br>

<img id="preview" width="250"/>
<p id="result"></p>

<script>
let model;

// Load MobileNet model
async function loadModel() {
    model = await mobilenet.load();
    console.log("Model Loaded");
}
loadModel();

document.getElementById("imageUpload").addEventListener("change", function(event) {
    const file = event.target.files[0];
    const img = document.getElementById("preview");

    img.src = URL.createObjectURL(file);

    img.onload = async function() {
        const predictions = await model.classify(img);

        console.log(predictions);

        // Check if it's a plant
        let isPlant = false;

        predictions.forEach(p => {
            if (p.className.toLowerCase().includes("plant") ||
                p.className.toLowerCase().includes("leaf") ||
                p.className.toLowerCase().includes("tree") ||
                p.className.toLowerCase().includes("flower")) {
                isPlant = true;
            }
        });

        if (!isPlant) {
            document.getElementById("result").innerHTML 
        } else {
            // Dummy disease logic (replace with real model later)
            document.getElementById("result").innerHTML =
                " Plant detected<br>Possible status: Healthy or Diseased (need trained model)";
        }
    };
});
</script>

</body>
</html>
